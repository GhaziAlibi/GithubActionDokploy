name: Docker Build and Publish .NET Core

on:
  push:
    branches:
      - master # Or your main branch name
    tags:
      - 'v*' # Optional: Trigger on tags like v1.0.0, v1.0.1, etc.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build .NET Core app
        run: dotnet build --configuration Release

      - name: Publish .NET Core app
        run: dotnet publish -c Release -o ./publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver-opts: image=moby/buildkit:v0.11.2-rootless # Optional: Use a specific BuildKit version

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile  # Make sure your Dockerfile is in the correct location
          push: true
          tags: |
            alibighazi/githubactiondokploy:latest
            alibighazi/githubactiondokploy:${{ github.sha }}
            ${{ steps.determine_tag.outputs.image_tag }}

      - name: Image digest
        if: ${{ always() }}
        run: |
          echo "Image digest: ${{ steps.build-and-push.outputs.digest }}"

      - name: Determine image tag
        id: determine_tag
        if: github.event_name == 'push'
        run: |
          if [[ startsWith(github.ref, 'refs/tags/') ]]; then
            echo "::set-output name=image_tag::alibighazi/githubactiondokploy:${{ github.ref_name }}"
          else
            echo "::set-output name=image_tag::alibighazi/githubactiondokploy:latest"
          fi
